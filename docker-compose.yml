services:
  # MongoDB service
  mongo:
    image: mongo:latest
    container_name: social-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Redis service for Socket.IO scaling
  redis:
    image: redis:7-alpine
    container_name: social-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js application service
  app:
    build: .
    container_name: social-app-v2
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/social
      - PORT=3000
      - JWT_SECRET=KHKDJSIOJFWEOF4346346JNDSKLFDSKLNVDLS
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  mongo-data:
  redis-data:
